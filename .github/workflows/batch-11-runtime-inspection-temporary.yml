name: Batch 11 runtime inspection (temporary)

on:
  push:
    branches:
      - agent/adjudication-batch-11
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Extract exact runtime references
        run: |
          mkdir -p batch-11-runtime-inspection
          {
            echo '# Exact git grep results'
            git grep -n -E 'ImpersonalEnvironmentalClause|IntransitiveVP|LexicalGiveRelation|LocativeExistentialClause|LocativeFrameClause' -- main.js tools tests grammar data || true
          } > batch-11-runtime-inspection/grep.txt
          python3 - <<'PY'
          from pathlib import Path
          text = Path('main.js').read_text().splitlines()
          labels = [
              'ImpersonalEnvironmentalClause',
              'IntransitiveVP',
              'LexicalGiveRelation',
              'LocativeExistentialClause',
              'LocativeFrameClause',
          ]
          out = []
          for label in labels:
              hits = [i for i, line in enumerate(text) if label in line]
              out.append(f'## {label}\n')
              if not hits:
                  out.append('_No direct main.js occurrence._\n')
                  continue
              for n, i in enumerate(hits, 1):
                  start = max(0, i - 45)
                  end = min(len(text), i + 46)
                  out.append(f'### Hit {n}: line {i+1}\n')
                  out.extend(f'{j+1}: {text[j]}' for j in range(start, end))
                  out.append('')
          Path('batch-11-runtime-inspection/main-js-context.txt').write_text('\n'.join(out))
          PY
      - uses: actions/upload-artifact@v6
        with:
          name: batch-11-runtime-inspection
          path: batch-11-runtime-inspection
          if-no-files-found: error
