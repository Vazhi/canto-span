name: Construction identity

on:
  push:
    paths:
      - data/construction-identities.json
      - data/construction-identity-candidates.json
      - data/construction-identity-lock.json
      - data/construction-label-sweep.json
      - data/construction-adjudications.json
      - config/construction-identity.schema.json
      - config/construction-adjudication.schema.json
      - tools/generate-construction-identities.js
      - tools/build-construction-identity-lock.js
      - tools/verify-construction-identities.js
      - tools/allocate-construction-identity.js
      - tools/apply-construction-adjudications.js
      - tools/construction-notes-lib.js
      - grammar/**
      - docs/current/CONSTRUCTION-IDENTITY.md
      - docs/current/CONSTRUCTION-ADJUDICATION.md
      - docs/research/FULL-REPO-LABEL-SWEEP-BASELINE-R1.md
      - docs/research/RETIRED-CONSTRUCTION-ARCHIVE-v0.5.186-R1.tsv
      - .github/workflows/construction-identity-bootstrap.yml
      - .github/workflows/apply-construction-adjudications.yml
  pull_request:
    paths:
      - data/construction-identities.json
      - data/construction-identity-candidates.json
      - data/construction-identity-lock.json
      - data/construction-label-sweep.json
      - data/construction-adjudications.json
      - config/construction-identity.schema.json
      - config/construction-adjudication.schema.json
      - tools/generate-construction-identities.js
      - tools/build-construction-identity-lock.js
      - tools/verify-construction-identities.js
      - tools/allocate-construction-identity.js
      - tools/apply-construction-adjudications.js
      - tools/construction-notes-lib.js
      - grammar/**
      - docs/current/CONSTRUCTION-IDENTITY.md
      - docs/current/CONSTRUCTION-ADJUDICATION.md
      - docs/research/FULL-REPO-LABEL-SWEEP-BASELINE-R1.md
      - docs/research/RETIRED-CONSTRUCTION-ARCHIVE-v0.5.186-R1.tsv
      - .github/workflows/construction-identity-bootstrap.yml
      - .github/workflows/apply-construction-adjudications.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Verify expert construction adjudications
        run: node tools/apply-construction-adjudications.js
      - name: Verify permanent construction identities
        run: node tools/verify-construction-identities.js
