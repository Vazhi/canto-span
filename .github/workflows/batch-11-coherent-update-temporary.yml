name: Batch 11 coherent branch update (temporary)

on:
  push:
    branches:
      - agent/adjudication-batch-11
  pull_request:
    branches:
      - main

concurrency:
  group: batch-11-coherent-update-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/adjudication-batch-11
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Apply adjudication and synchronize current documentation
        run: |
          npm run adjudication:apply
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          registry = json.loads(Path("data/construction-identities.json").read_text())
          readiness = json.loads(Path("data/construction-candidate-readiness.json").read_text())
          adjudicated = sum(r.get("label_review", {}).get("review_state") == "complete" for r in registry["records"])
          pending = registry["record_count"] - adjudicated
          states = readiness["state_counts"]
          source_supported = states.get("source_supported", 0)
          narrowing = states.get("narrowing_candidate", 0)
          excluded = states.get("excluded_nonlanguage", 0)

          if (adjudicated, pending) != (54, 127):
              raise SystemExit(f"unexpected adjudication counts: {adjudicated}, {pending}")

          def sub(path, pattern, replacement, flags=0):
              p = Path(path)
              text = p.read_text()
              changed, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"expected one replacement in {path}: {pattern!r}; got {count}")
              p.write_text(changed)

          sub("README.md", r"expert-adjudicated identities: \*\*\d+ / 181\*\*", f"expert-adjudicated identities: **{adjudicated} / 181**")
          sub("README.md", r"direct `source_supported` candidates: \*\*\d+\*\*", f"direct `source_supported` candidates: **{source_supported}**")
          sub("README.md", r"current narrowing candidates: \*\*\d+\*\*", f"current narrowing candidates: **{narrowing}**")
          sub("README.md", r"excluded non-language/internal records: \*\*\d+\*\*", f"excluded non-language/internal records: **{excluded}**")

          sub("docs/current/00-START-HERE.md", r"completed expert adjudications: \*\*\d+\*\*", f"completed expert adjudications: **{adjudicated}**")
          sub("docs/current/00-START-HERE.md", r"pending expert adjudications: \*\*\d+\*\*", f"pending expert adjudications: **{pending}**")

          sub("docs/current/CONSTRUCTION-IDENTITY.md", r"expert-adjudicated records: \*\*\d+\*\*", f"expert-adjudicated records: **{adjudicated}**")
          sub("docs/current/CONSTRUCTION-IDENTITY.md", r"accepted adjudication batches: \*\*\d+\*\*", "accepted adjudication batches: **11**")

          sub("docs/current/CONSTRUCTION-ADJUDICATION.md", r"accepted adjudications: \*\*\d+\*\*", f"accepted adjudications: **{adjudicated}**")
          sub("docs/current/CONSTRUCTION-ADJUDICATION.md", r"pending adjudications: \*\*\d+\*\*", f"pending adjudications: **{pending}**")
          sub("docs/current/CONSTRUCTION-ADJUDICATION.md", r"accepted batches: \*\*\d+\*\*", "accepted batches: **11**")
          sub("docs/current/CONSTRUCTION-ADJUDICATION.md", r"`docs/research/CONSTRUCTION-ADJUDICATION-BATCH-10\.md`", "`docs/research/CONSTRUCTION-ADJUDICATION-BATCH-11.md`")
          sub(
              "docs/current/CONSTRUCTION-ADJUDICATION.md",
              r"The next planned batch is Batch 11:\n\n1\. `AA72 ImpersonalEnvironmentalClause`;\n2\. `AA75 IntransitiveVP`;\n3\. `AA76 LexicalGiveRelation`;\n4\. `AA77 LocativeExistentialClause`;\n5\. `AA79 LocativeFrameClause`\.",
              "The next planned batch is Batch 12:\n\n1. `AA80 LocativePlacePhrase`;\n2. `AA82 LocativeWhQuestion`;\n3. `AA83 MalformedCandidate`;\n4. `AA85 MeasureExpression`;\n5. `AA86 ModalANotAQuestion`."
          )

          sub("docs/current/PROJECT-STATE.md", r"\| Expert-adjudicated UUIDs \| \d+ \|", f"| Expert-adjudicated UUIDs | {adjudicated} |")
          sub("docs/current/PROJECT-STATE.md", r"\| Pending UUID adjudications \| \d+ \|", f"| Pending UUID adjudications | {pending} |")
          sub("docs/current/PROJECT-STATE.md", r"Ten accepted batches have adjudicated 49 records\.", "Eleven accepted batches have adjudicated 54 records.")
          sub("docs/current/PROJECT-STATE.md", r"\| `source_supported` \| \d+ \|", f"| `source_supported` | {source_supported} |")
          sub("docs/current/PROJECT-STATE.md", r"\| `narrowing_candidate` \| \d+ \|", f"| `narrowing_candidate` | {narrowing} |")
          sub("docs/current/PROJECT-STATE.md", r"\| `excluded_nonlanguage` \| \d+ \|", f"| `excluded_nonlanguage` | {excluded} |")
          sub(
              "docs/current/PROJECT-STATE.md",
              r"- Batch 10 reclassifies `AA66 ContextLinkedAnswerUtteranceWrapper` as an internal\n  discourse representation and narrows `AA58`, `AA62`, `AA67`, and `AA68` to\n  `JauMeNounWhQuestion`, `GwoMarkedExperientialObjectVP`,\n  `NeMarkedThematicContinuationQuestion`, and `MotionVerbDouGoalVP`;",
              "- Batch 10 reclassifies `AA66 ContextLinkedAnswerUtteranceWrapper` as an internal\n  discourse representation and narrows `AA58`, `AA62`, `AA67`, and `AA68` to\n  `JauMeNounWhQuestion`, `GwoMarkedExperientialObjectVP`,\n  `NeMarkedThematicContinuationQuestion`, and `MotionVerbDouGoalVP`;\n- Batch 11 reclassifies `AA72 EnvironmentalPredicateClauseWrapper`,\n  `AA75 BareActionPredicateRelationMember`, and\n  `AA79 PlaceInitialPredicateClauseWrapper` as internal representations and narrows\n  `AA76` and `AA77` to `BeiThemeRecipientGiveVP` and\n  `PlaceInitialJauMouExistentialClause`;"
          )
          sub(
              "docs/current/PROJECT-STATE.md",
              r"2\. Continue expert adjudication with Batch 11: `AA72 ImpersonalEnvironmentalClause`,\n   `AA75 IntransitiveVP`, `AA76 LexicalGiveRelation`,\n   `AA77 LocativeExistentialClause`, and `AA79 LocativeFrameClause`\.",
              "2. Continue expert adjudication with Batch 12: `AA80 LocativePlacePhrase`,\n   `AA82 LocativeWhQuestion`, `AA83 MalformedCandidate`,\n   `AA85 MeasureExpression`, and `AA86 ModalANotAQuestion`."
          )

          Path("batch-11-counts.json").write_text(json.dumps({
              "adjudicated": adjudicated,
              "pending": pending,
              "state_counts": states,
          }, indent=2) + "\n")
          PY
      - name: Verify coherent state
        run: |
          npm run verify:adjudications
          npm run verify:identities
          npm run verify:discovery
          npm run verify
          npm run verify:research
          git restore --staged --worktree validation/current || true
          git clean -fd validation/current
          rm .github/workflows/batch-11-runtime-inspection-temporary.yml
          rm .github/workflows/batch-11-coherent-update-temporary.yml
          rm batch-11-counts.json
          git diff --check
          test -z "$(git status --porcelain | grep -E '(^| )validation/current/' || true)"
          test -z "$(git diff --name-only | grep -E '^(main\.js|grammar/|tests/|review-packets/|external-evidence/|data/release-baselines/)' || true)"
      - name: Commit coherent Batch 11 state
        if: github.event_name == 'push'
        run: |
          git config user.name "canto-span-batch-11"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Apply construction adjudication batch 11"
          git push origin HEAD:agent/adjudication-batch-11
