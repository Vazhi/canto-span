name: Apply construction adjudications

on:
  push:
    branches:
      - agent/permanent-construction-identity-sweep
    paths:
      - data/construction-adjudications.json
      - data/construction-adjudication-batches/**
      - tools/apply-construction-adjudications.js
      - tools/generate-construction-identities.js
      - tools/generate-supported-productive-discovery.js
      - .github/workflows/apply-construction-adjudications.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: construction-adjudication-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/permanent-construction-identity-sweep
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Apply and regenerate adjudication outputs
        run: |
          npm run adjudication:apply
          node tools/generate-construction-identities.js --write
          npm run discovery:generate
      - name: Verify regenerated state before writing
        run: |
          npm run verify:adjudications
          npm run verify:identities
          npm run verify:discovery
          npm run verify:research
      - name: Commit regenerated records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/construction-identities.json \
            data/construction-label-sweep.json \
            data/construction-candidate-readiness.json \
            docs/research/FULL-REPO-LABEL-SWEEP-BASELINE-R1.md \
            docs/research/SUPPORTED-PRODUCTIVE-CANDIDATES.md \
            docs/research/ORPHANED-CONSTRUCTION-EVIDENCE.md \
            docs/research/CONSTRUCTION-FAMILY-GAPS.md \
            docs/research/FULL-REPO-SUPPORTED-PRODUCTIVE-SWEEP-R1.md
          if git diff --cached --quiet; then
            echo "Adjudication outputs already current"
          else
            git commit -m "Apply expert construction adjudications"
            git push origin HEAD:agent/permanent-construction-identity-sweep
          fi
